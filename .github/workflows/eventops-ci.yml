name: EventOps CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  scenario:
    name: scenario
    runs-on: ubuntu-latest
    outputs:
      scenario_id: ${{ steps.scenario.outputs.scenario_id }}
      pipeline_mode: ${{ steps.scenario.outputs.pipeline_mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read experiment scenario
        id: scenario
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          scenario = json.loads(Path("experiment/scenario.json").read_text(encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"scenario_id={scenario.get('id', 'unknown')}\n")
              output.write(f"pipeline_mode={scenario.get('pipeline_mode', 'parallel')}\n")
          PY

      - name: Upload scenario artifact
        uses: actions/upload-artifact@v4
        with:
          name: scenario-config
          path: experiment/scenario.json

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: scenario
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: [scenario, lint]
    if: needs.scenario.outputs.pipeline_mode != 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not integration and not load" --junitxml artifacts/unit-tests.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-results
          path: artifacts/unit-tests.xml
          if-no-files-found: warn

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs: [scenario, lint]
    if: needs.scenario.outputs.pipeline_mode != 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration --junitxml artifacts/integration-tests.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-results
          path: artifacts/integration-tests.xml
          if-no-files-found: warn

  load-tests:
    name: load-tests
    runs-on: ubuntu-latest
    needs: [scenario, lint]
    if: needs.scenario.outputs.pipeline_mode != 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run load tests
        run: pytest -m load --junitxml artifacts/load-tests.xml

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-tests-results
          path: artifacts/load-tests.xml
          if-no-files-found: warn

  unit-tests-sequential:
    name: unit-tests-sequential
    runs-on: ubuntu-latest
    needs: [scenario, lint]
    if: needs.scenario.outputs.pipeline_mode == 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not integration and not load" --junitxml artifacts/unit-tests.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-results
          path: artifacts/unit-tests.xml
          if-no-files-found: warn

  integration-tests-sequential:
    name: integration-tests-sequential
    runs-on: ubuntu-latest
    needs: [scenario, lint, unit-tests-sequential]
    if: needs.scenario.outputs.pipeline_mode == 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest -m integration --junitxml artifacts/integration-tests.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-results
          path: artifacts/integration-tests.xml
          if-no-files-found: warn

  load-tests-sequential:
    name: load-tests-sequential
    runs-on: ubuntu-latest
    needs: [scenario, lint, integration-tests-sequential]
    if: needs.scenario.outputs.pipeline_mode == 'sequential'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            experiment/cache_salt.txt

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run load tests
        run: pytest -m load --junitxml artifacts/load-tests.xml

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-tests-results
          path: artifacts/load-tests.xml
          if-no-files-found: warn

  artifact-summary:
    name: artifact-summary
    runs-on: ubuntu-latest
    needs:
      - scenario
      - lint
      - unit-tests
      - integration-tests
      - load-tests
      - unit-tests-sequential
      - integration-tests-sequential
      - load-tests-sequential
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build run metadata
        env:
          SCENARIO_ID: ${{ needs.scenario.outputs.scenario_id }}
          PIPELINE_MODE: ${{ needs.scenario.outputs.pipeline_mode }}
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          LOAD_RESULT: ${{ needs.load-tests.result }}
          UNIT_SEQ_RESULT: ${{ needs.unit-tests-sequential.result }}
          INTEGRATION_SEQ_RESULT: ${{ needs.integration-tests-sequential.result }}
          LOAD_SEQ_RESULT: ${{ needs.load-tests-sequential.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.workflow }}
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "run_id": os.environ["RUN_ID"],
              "run_number": os.environ["RUN_NUMBER"],
              "commit_sha": os.environ["COMMIT_SHA"],
              "commit_message": os.environ["COMMIT_MESSAGE"].splitlines()[0],
              "scenario_id": os.environ["SCENARIO_ID"],
              "pipeline_mode": os.environ["PIPELINE_MODE"],
              "jobs": {
                  "lint": os.environ["LINT_RESULT"],
                  "unit-tests": os.environ["UNIT_RESULT"],
                  "integration-tests": os.environ["INTEGRATION_RESULT"],
                  "load-tests": os.environ["LOAD_RESULT"],
                  "unit-tests-sequential": os.environ["UNIT_SEQ_RESULT"],
                  "integration-tests-sequential": os.environ["INTEGRATION_SEQ_RESULT"],
                  "load-tests-sequential": os.environ["LOAD_SEQ_RESULT"],
              },
          }
          Path("artifacts/run-metadata.json").write_text(
              json.dumps(payload, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Upload run metadata
        uses: actions/upload-artifact@v4
        with:
          name: run-metadata
          path: artifacts/run-metadata.json
          if-no-files-found: error
